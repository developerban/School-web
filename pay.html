<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>School Payment</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=DM+Serif+Display&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {

            background: #F7F6FB;

        }

        .payment {

            padding: 120px 20px;

        }

        .payment-card {

            max-width: 550px;

            margin: auto;

            background: white;

            padding: 40px;

            border-radius: 25px;

            box-shadow: 0 20px 50px rgba(0, 0, 0, .08);

            text-align: center;

        }

        .payment-card h1 {

            margin-bottom: 20px;

        }

        .payment-card img {

            width: 280px;

            margin: 25px auto;

            display: block;

        }

        .payment-card h3 {

            margin: 20px 0;

        }

        .payment-card p {

            margin: 10px 0;

        }

        .payment-btn {

            display: inline-block;

            margin-top: 20px;

            padding: 15px 35px;

            background: #633BCA;

            color: white;

            border-radius: 50px;

        }

        .payment-btn:hover {

            background: #4d2fb5;

        }
    </style>

</head>

<body>

    <header class="header">

        <div class="container nav-container">

            <a href="index.html" class="logo">

                EduKids<span>.</span>

            </a>

                <i class="fa-solid fa-arrow-left"></i>

                &nbsp;Back Home

            </a>

        </div>

    </header>

    <section class="payment">

        <div class="payment-card">

            <h1>

                Pay School Fees

            </h1>

            <p>

                Scan the QR Code below to make payment.

            </p>

<!-- TEMP PLACEHOLDER IMAGE - Replace with school image -->

            </h3>

            <p>

            </p>

            <p>

                Demo Phone

                +91 7321 456 789

            </p>

            <a href="https://wa.me/917321456789" class="payment-btn">

                Need Help?

            </a>

        </div>

    </section>

</body>

</html>
